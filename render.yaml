services:
  - type: web
    name: mindguard
    env: docker
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FRONTEND_DIR
        value: /app/frontend
      - key: PYTHONPATH
        value: /app
      - key: API_HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: API_PORT
        value: "10000"
