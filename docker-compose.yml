services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    env_file:
      - .env
    environment:
      - MINDGUARD_DB_DIR=/app/data
      - PORT=${PORT:-8000}
      - API_PORT=${PORT:-8000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80,http://127.0.0.1:80,http://localhost:5173}
    volumes:
      - mindguard_data:/app/data
      - backend_cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:${PORT:-8000}/api/health', timeout=5).raise_for_status()\""]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  mindguard_data:
  backend_cache:
